name: Bump plugin version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for agent/skill changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(agents/|skills/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        run: |
          PLUGIN=".claude-plugin/plugin.json"
          MARKETPLACE=".claude-plugin/marketplace.json"

          CURRENT=$(jq -r '.version' "$PLUGIN")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN" > tmp.json && mv tmp.json "$PLUGIN"
          jq --arg v "$NEW_VERSION" '.metadata.version = $v | .plugins[0].version = $v' "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

          echo "Bumped version: $CURRENT -> $NEW_VERSION"

      - name: Commit version bump
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump plugin version to $(jq -r '.version' .claude-plugin/plugin.json)"
          git push
